name: Generate ASCII Artwork

on:
  push:
    branches:
      - main

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Cowsay
        run: sudo apt-get update && sudo apt-get install cowsay -y

      - name: Generate Dragon Art
        run: |
          /usr/games/cowsay -f dragon "Building the Dragon..." > dragon.txt
          cat dragon.txt

      - name: Upload Dragon Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-file
          path: dragon.txt

  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
      - name: Download Dragon Artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-file

      - name: Test Art File
        run: |
          if grep -q "Dragon" dragon.txt; then
            echo "Test Passed: Dragon found!"
          else
            echo "Test Failed"
            exit 1
          fi

  deploy_job_3:
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
      - name: Download Dragon Artifact
        uses: actions/download-artifact@v4
        with:
          name: dragon-file

      - name: Deploy (Final Display)
        run: |
          echo "Deploying the following artwork to the logs:"
          cat dragon.txt